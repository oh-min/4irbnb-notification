server:
  port: 19098
  address: 0.0.0.0

spring:
  application:
    name: notification
  config:
    import: optional:file:.env[.properties]
  #    import: "configserver:http://localhost:18080"
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    url: jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

user:
  service:
    url: http://localhost:${USER_SERVICE_PORT}

#eureka:
#  client:
#    service-url:
#      defaultZone: http://43.203.174.245:19090/eureka/

message: "default message" # config server? ???? ?? ?

management:
  endpoints:
    web:
      exposure:
        include: refresh

slack:
  bot-token: ${SLACK_BOT_TOKEN}