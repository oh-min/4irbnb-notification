server:
  port: 19098

spring:
  application:
    name: notification
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  #    import: "configserver:http://localhost:18080"
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url: jdbc:postgresql://localhost:${POSTGRES_BINDING_PORT}/${POSTGRES_DB}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

user:
  service:
    url: http://localhost:${USER_SERVICE_PORT}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

